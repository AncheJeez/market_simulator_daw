name: trading-simulator-local

services:
  postgres:
    image: postgres:16
    container_name: trading-simulator-local-db
    restart: always
    environment:
      POSTGRES_DB: trading_simulator
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    command: postgres -c listen_addresses='*'
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./back-end/testing-symbols.sql:/docker-entrypoint-initdb.d/02-symbols.sql

volumes:
  postgres_local_data:
